<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Whirl</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d12;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        background: radial-gradient(ellipse at center, rgba(20, 24, 33, 0.7), rgba(7, 8, 12, 0.92));
        z-index: 10;
        transition: opacity 0.45s ease;
        text-align: center;
        padding: 24px;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #overlay h1 {
        font-size: clamp(38px, 12vw, 92px);
        font-weight: 700;
        letter-spacing: 0.18em;
        color: #f3f0ea;
        text-shadow: 0 0 28px rgba(120, 180, 255, 0.35);
      }
      #overlay p {
        max-width: 460px;
        color: #aeb6c4;
        font-size: clamp(14px, 3.6vw, 17px);
        line-height: 1.55;
      }
      #overlay .status {
        font-size: clamp(20px, 6vw, 34px);
        font-weight: 600;
        color: #ffd98a;
      }
      button.start {
        margin-top: 8px;
        padding: 15px 38px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: #0b0d12;
        background: linear-gradient(180deg, #ffe7a8, #f4c25e);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(244, 194, 94, 0.3);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      button.start:active {
        transform: translateY(2px) scale(0.98);
        box-shadow: 0 4px 14px rgba(244, 194, 94, 0.25);
      }
      #hint {
        position: fixed;
        bottom: 14px;
        left: 0;
        right: 0;
        text-align: center;
        color: #5d677a;
        font-size: 12px;
        letter-spacing: 0.04em;
        pointer-events: none;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hint">drag the dial to spin · tap a tray to drop · press D for debug</div>
    <div id="overlay">
      <h1>WHIRL</h1>
      <p>
        Spin the dial with your thumb. Drop colored marbles onto the loop and let them ride
        into their matching boxes. Three of a color clears the box. Don't jam the loop.
      </p>
      <p class="status" id="status"></p>
      <button class="start" id="startBtn">Tap to Play</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
